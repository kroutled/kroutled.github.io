<div class="row">
    <div *ngFor="let project of projects">
        <a href="{{project.urlLink}}" target="_blank">
            <div class="column">
                <div class="item">
                    <h1 class="project-header">{{ project.name }}</h1>
                    <p class="text">{{ project.discription }}</p>
                    <img class="image" src="../../../assets/PS.jpg">
                </div>
            </div>
            </a>
    </div>
</div>
